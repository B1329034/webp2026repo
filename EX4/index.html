<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Ex#4 聖誕樹作業</title>
</head>
<body>
    <h1>請按 F12 開啟 Console 查看結果</h1>
    <script>
        function tree(n) {
            printTreeTop(n);
            printTreeBottom(n);
        }

        function printTreeTop(n) {
            for (let i = 1; i <= n; i++) {
                let space = repeatchar(n - i, ' ');
                let stars = repeatchar(2 * i - 1, '*');
                console.log(space + stars);
            }
        }

        function printTreeBottom(n) {
            for (let i = 0; i < 3; i++) {
                let space = repeatchar(n - 1, ' ');
                console.log(space + '*');
            }
        }

        function repeatchar(n, arg_char) {
            let result = "";
            for (let i = 0; i < n; i++) {
                result += arg_char;
            }
            return result;
        }

        // 呼叫函數
        tree(4);
    </script>
</body>
</html>
